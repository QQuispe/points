{% extends 'base.html' %}

{% block content %}

<h1>Enter scores below</h1>

<script type="text/javascript" src="https://cdn.jsdelivr.net/gh/bbbootstrap/libraries@main/jquery.tabledit.js"></script>
<div class="container mt-100">
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-block">
                    <div class="table-responsive">
                        <table class="table table-striped table-bordered" id="example-1">
                            <thead>
                                <tr>
                                    <th style="display: none;">#</th>
                                    <th>Player</th>
                                    <th>Col 2</th>
                                    <th>Col 3</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <th scope="row" style="display: none;">1</th>
                                    <td class="tabledit-view-mode" style="cursor: pointer;"><span
                                            class="tabledit-span">Test </span><input
                                            class="tabledit-input form-control input-sm" type="text" name="First Name"
                                            value="Mark
" style="display: none;" disabled=""></td>
                                    <td class="tabledit-view-mode" style="cursor: pointer;"><span
                                            class="tabledit-span">Motto </span><input
                                            class="tabledit-input form-control input-sm fill" type="text"
                                            name="Last Name" value="Otto
" style="display: none;" disabled=""></td>
                                    <td class="tabledit-view-mode"><span class="tabledit-span"></span>
                                    </td>
                                </tr>
                                <tr>
                                    <th scope="row" style="display: none;">2</th>
                                    <td class="tabledit-view-mode" style="cursor: pointer;"><span
                                            class="tabledit-span">Test </span><input
                                            class="tabledit-input form-control input-sm" type="text" name="First Name"
                                            value="Jacob
" style="display: none;" disabled=""></td>
                                    <td class="tabledit-view-mode" style="cursor: pointer;"><span
                                            class="tabledit-span">Test </span><input
                                            class="tabledit-input form-control input-sm" type="text" name="Last Name"
                                            value="Thorntonkk
" style="display: none;" disabled=""></td>
                                    <td class="tabledit-view-mode"><span class="tabledit-span"></span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    $(document).ready(function () {
        // example.php will be used to send the data to the sever database
        $('#example-1').Tabledit({
            url: 'example.php',
            editButton: false,
            deleteButton: false,
            hideIdentifier: true,
            columns: {
                identifier: [0, 'id'],
                editable: [[2, 'first'], [3, 'last'], [3, 'nickname']]
            }
        });

    });
</script>

{% endblock %}
